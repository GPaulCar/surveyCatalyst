<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>surveyCatalyst OpenLayers Survey Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.6.1/ol.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; }
    #layout { display: grid; grid-template-columns: 360px 1fr; height: 100%; }
    #sidebar { padding: 12px; overflow: auto; border-right: 1px solid #ddd; background: #fafafa; }
    #map { width: 100%; height: 100%; }
    .section { margin-bottom: 16px; }
    .hint { color: #555; font-size: 12px; }
    .survey-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
    code { background: #f1f1f1; padding: 2px 4px; }
    button, select, input { margin-top: 6px; }
    pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="layout">
    <div id="sidebar">
      <div class="section">
        <h2>surveyCatalyst</h2>
        <div class="hint">Survey-centric OpenLayers client using the FastAPI/PostGIS backend.</div>
      </div>

      <div class="section">
        <strong>Viewport query</strong><br>
        <label for="limitInput">Feature limit</label>
        <input id="limitInput" type="number" style="width:100%" value="5000" min="1" max="50000">
        <div class="hint">BBox comes from the current map extent and is converted to EPSG:4326.</div>
        <button id="reloadBtn">Load selected surveys</button>
        <button id="clearBtn">Clear survey layers</button>
      </div>

      <div class="section">
        <h3>Surveys</h3>
        <div id="surveyList"></div>
      </div>

      <div class="section">
        <label for="focusSurvey"><strong>Focus survey</strong></label>
        <select id="focusSurvey" style="width:100%">
          <option value="">None</option>
        </select>
        <button id="showFocusedBtn">Show only focused survey</button>
      </div>

      <div class="section">
        <h3>Selected feature</h3>
        <pre id="featureInfo">Click a feature on the map.</pre>
      </div>
    </div>
    <div id="map"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/ol@10.6.1/dist/ol.js"></script>
  <script>
    const baseLayer = new ol.layer.Tile({ source: new ol.source.OSM() });
    const map = new ol.Map({
      target: 'map',
      layers: [baseLayer],
      view: new ol.View({
        center: ol.proj.fromLonLat([11.55, 48.15]),
        zoom: 7,
      })
    });

    const surveyLayerStore = new Map();
    const surveyStore = new Map();

    function styleForFeature(feature) {
      const role = feature.get('feature_role');
      if (role === 'survey_boundary') {
        return new ol.style.Style({
          stroke: new ol.style.Stroke({ color: '#0a8f55', width: 3 }),
          fill: new ol.style.Fill({ color: 'rgba(184, 245, 209, 0.15)' })
        });
      }
      return new ol.style.Style({
        stroke: new ol.style.Stroke({ color: '#1557b0', width: 2 }),
        fill: new ol.style.Fill({ color: 'rgba(61, 132, 245, 0.20)' }),
        image: new ol.style.Circle({ radius: 4, fill: new ol.style.Fill({ color: '#1557b0' }) })
      });
    }

    async function fetchJson(url) {
      const response = await fetch(url);
      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || response.statusText);
      }
      return response.json();
    }

    function getCurrentBbox4326() {
      const extent3857 = map.getView().calculateExtent(map.getSize());
      const bottomLeft = ol.proj.transform([extent3857[0], extent3857[1]], 'EPSG:3857', 'EPSG:4326');
      const topRight = ol.proj.transform([extent3857[2], extent3857[3]], 'EPSG:3857', 'EPSG:4326');
      return [bottomLeft[0], bottomLeft[1], topRight[0], topRight[1]];
    }

    function getSelectedSurveyIds() {
      return Array.from(document.querySelectorAll('#surveyList input[type="checkbox"]:checked'))
        .map(el => parseInt(el.dataset.surveyId, 10))
        .filter(Number.isFinite);
    }

    function clearSurveyLayers() {
      for (const layer of surveyLayerStore.values()) {
        map.removeLayer(layer);
      }
      surveyLayerStore.clear();
    }

    async function loadSurvey(surveyId) {
      const bbox = getCurrentBbox4326().join(',');
      const limit = document.getElementById('limitInput').value.trim() || '5000';
      const geojson = await fetchJson(`/api/surveys/${surveyId}/features?bbox=${encodeURIComponent(bbox)}&limit=${encodeURIComponent(limit)}`);

      const source = new ol.source.Vector({
        features: new ol.format.GeoJSON().readFeatures(geojson, { featureProjection: 'EPSG:3857' })
      });

      const layer = new ol.layer.Vector({
        source,
        style: styleForFeature
      });
      layer.set('survey_id', surveyId);
      surveyLayerStore.set(surveyId, layer);
      map.addLayer(layer);
    }

    async function loadSelectedSurveys() {
      clearSurveyLayers();
      const selected = getSelectedSurveyIds();
      for (const surveyId of selected) {
        await loadSurvey(surveyId);
      }
    }

    function populateSurveyControls(surveys) {
      const list = document.getElementById('surveyList');
      const focus = document.getElementById('focusSurvey');
      list.innerHTML = '';
      focus.innerHTML = '<option value="">None</option>';

      for (const survey of surveys) {
        surveyStore.set(survey.id, survey);

        const row = document.createElement('div');
        row.className = 'survey-row';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.dataset.surveyId = survey.id;

        const label = document.createElement('label');
        const title = survey.title || `Survey ${survey.id}`;
        const status = survey.status ? ` (${survey.status})` : '';
        label.textContent = `${title} [${survey.id}]${status}`;

        row.appendChild(checkbox);
        row.appendChild(label);
        list.appendChild(row);

        const option = document.createElement('option');
        option.value = String(survey.id);
        option.textContent = `${title} [${survey.id}]`;
        focus.appendChild(option);
      }
    }

    async function loadSurveyList() {
      const surveys = await fetchJson('/api/surveys');
      populateSurveyControls(surveys);
    }

    map.on('singleclick', function (event) {
      let found = null;
      map.forEachFeatureAtPixel(event.pixel, function (feature) {
        found = feature;
        return true;
      });
      document.getElementById('featureInfo').textContent = found
        ? JSON.stringify(found.getProperties(), null, 2)
        : 'No feature selected.';
    });

    document.getElementById('reloadBtn').addEventListener('click', async () => {
      try {
        await loadSelectedSurveys();
      } catch (error) {
        document.getElementById('featureInfo').textContent = `Error: ${error.message}`;
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      clearSurveyLayers();
    });

    document.getElementById('showFocusedBtn').addEventListener('click', () => {
      const selectedId = document.getElementById('focusSurvey').value;
      for (const checkbox of document.querySelectorAll('#surveyList input[type="checkbox"]')) {
        checkbox.checked = selectedId !== '' && checkbox.dataset.surveyId === selectedId;
      }
    });

    loadSurveyList().catch((error) => {
      document.getElementById('surveyList').innerHTML = `<pre>${error.message}</pre>`;
    });
  </script>
</body>
</html>
