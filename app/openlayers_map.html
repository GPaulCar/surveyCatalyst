<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>surveyCatalyst OpenLayers Client</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v9.2.4/ol.css">
  <style>
    html, body { margin: 0; height: 100%; font-family: Arial, sans-serif; }
    #layout { display: grid; grid-template-columns: 320px 1fr 420px; height: 100%; }
    #leftPanel, #rightPanel { overflow: auto; padding: 12px; box-sizing: border-box; background: #f5f5f5; border-right: 1px solid #ddd; }
    #rightPanel { border-right: 0; border-left: 1px solid #ddd; }
    #map { width: 100%; height: 100%; }
    h2, h3 { margin: 8px 0; }
    .section { margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid #ddd; }
    label { display: block; margin: 6px 0 2px; font-size: 13px; }
    input, select, textarea, button { width: 100%; box-sizing: border-box; margin-bottom: 6px; padding: 6px; }
    textarea { min-height: 70px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .small { font-size: 12px; color: #555; }
    .tabs { display: flex; gap: 6px; margin-bottom: 8px; }
    .tabButton { flex: 1; padding: 8px; border: 1px solid #bbb; background: #fff; cursor: pointer; }
    .tabButton.active { background: #dcecff; }
    .tabPanel { display: none; height: calc(100% - 46px); overflow: auto; }
    .tabPanel.active { display: block; }
    .hierarchyList { max-height: calc(100vh - 130px); overflow-y: auto; border: 1px solid #ccc; background: #fff; }
    .hierarchyRow { padding: 8px; border-bottom: 1px solid #eee; cursor: pointer; }
    .hierarchyRow:hover { background: #f0f7ff; }
    .hierarchyRow.selected { background: #dcecff; }
    .hierarchyRow.survey { font-weight: bold; }
    .badge { display: inline-block; padding: 2px 6px; background: #eee; border-radius: 999px; font-size: 11px; margin-left: 6px; }
    #statusBox { min-height: 24px; padding: 8px; background: #fff; border: 1px solid #ccc; }
    #detailsBox { white-space: pre-wrap; background: #fff; border: 1px solid #ccc; padding: 8px; min-height: 240px; }
  </style>
</head>
<body>
<div id="layout">
  <div id="leftPanel">
    <div class="section">
      <h2>Surveys</h2>
      <button id="refreshSurveysBtn">Refresh survey list</button>
      <label for="surveySelect">Focused survey</label>
      <select id="surveySelect"></select>
      <div class="row">
        <button id="loadSurveyBtn">Load survey</button>
        <button id="showActiveOnlyBtn">Show active only</button>
      </div>
      <div class="row">
        <button id="zoomActiveBtn">Zoom active</button>
        <button id="reloadHierarchyBtn">Refresh hierarchy</button>
      </div>
      <div class="small" id="activeSurveySummary">No active survey</div>
    </div>

    <div class="section">
      <h3>Create Survey</h3>
      <label for="createSurveyExpeditionId">Expedition ID</label>
      <input id="createSurveyExpeditionId" type="number" value="1">
      <label for="createSurveyTitle">Title</label>
      <input id="createSurveyTitle" type="text">
      <label for="createSurveyStatus">Status</label>
      <input id="createSurveyStatus" type="text" value="planned">
      <label for="createSurveyMetadata">Metadata (JSON)</label>
      <textarea id="createSurveyMetadata">{}</textarea>
      <button id="armCreateSurveyBtn">Arm create survey polygon</button>
    </div>

    <div class="section">
      <h3>Create Object</h3>
      <label for="objectType">Object type</label>
      <select id="objectType">
        <option value="find_spot">find_spot</option>
        <option value="track">track</option>
        <option value="area">area</option>
        <option value="note">note</option>
      </select>
      <label for="objectExpeditionId">Expedition ID</label>
      <input id="objectExpeditionId" type="number" value="1">
      <label for="objectTitle">Title</label>
      <input id="objectTitle" type="text">
      <label for="objectAnnotation">Annotation</label>
      <textarea id="objectAnnotation"></textarea>
      <label for="objectDetails">Details</label>
      <textarea id="objectDetails"></textarea>
      <label for="objectProperties">Properties (JSON)</label>
      <textarea id="objectProperties">{}</textarea>
      <div class="row3">
        <button id="armPointBtn">Add point</button>
        <button id="armLineBtn">Add line</button>
        <button id="armPolygonBtn">Add polygon</button>
      </div>
    </div>

    <div class="section">
      <h3>Actions</h3>
      <button id="saveSelectedGeometryBtn">Save selected geometry</button>
      <button id="saveSelectedDetailsBtn">Save selected details</button>
      <div class="row">
        <button id="deleteSelectedBtn">Delete selected object</button>
        <button id="deleteActiveSurveyBtn">Delete active survey</button>
      </div>
    </div>

    <div class="section">
      <h3>Status</h3>
      <div id="statusBox"></div>
    </div>
  </div>

  <div id="map"></div>

  <div id="rightPanel">
    <div class="tabs">
      <button class="tabButton active" data-tab="hierarchyTab">Hierarchy</button>
      <button class="tabButton" data-tab="detailsTab">Details</button>
      <button class="tabButton" data-tab="editorTab">Editor</button>
      <button class="tabButton" data-tab="exportTab">Export</button>
    </div>

    <div id="hierarchyTab" class="tabPanel active">
      <div class="hierarchyList" id="hierarchyList"></div>
    </div>

    <div id="detailsTab" class="tabPanel">
      <div id="detailsBox">Nothing selected</div>
    </div>

    <div id="editorTab" class="tabPanel">
      <label for="editorTitle">Title</label>
      <input id="editorTitle" type="text">
      <label for="editorType">Type</label>
      <input id="editorType" type="text">
      <label for="editorStatus">Status</label>
      <input id="editorStatus" type="text">
      <label for="editorAnnotation">Annotation</label>
      <textarea id="editorAnnotation"></textarea>
      <label for="editorDetails">Details</label>
      <textarea id="editorDetails"></textarea>
      <label for="editorProperties">Properties (JSON)</label>
      <textarea id="editorProperties">{}</textarea>
      <div class="small">Edit fields here, then use the action buttons on the left to save geometry or details.</div>
    </div>

    <div id="exportTab" class="tabPanel">
      <label><input id="exportIncludeBoundary" type="checkbox" checked> Include survey boundary</label>
      <label><input id="exportIncludeObjects" type="checkbox" checked> Include survey objects</label>
      <label><input id="exportIncludeArchived" type="checkbox"> Include archived objects</label>
      <label><input id="exportIncludeGeometry" type="checkbox" checked> Include geometry in data export</label>
      <label><input id="exportIncludeProperties" type="checkbox" checked> Include object properties in data export</label>
      <label><input id="exportDocumentIncludeDetails" type="checkbox" checked> Include object details in document</label>
      <label><input id="exportDocumentIncludeMap" type="checkbox" checked> Include current map image in document</label>
      <div class="row">
        <button id="downloadLayerExportBtn">Download layer GeoJSON</button>
        <button id="downloadDataExportBtn">Download data JSON</button>
      </div>
      <button id="downloadDocumentExportBtn">Download printable document</button>
      <div class="small">Exports use the active survey. The document export is a printable HTML file and can embed the current map image.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/ol@v9.2.4/dist/ol.js"></script>
<script>
const map = new ol.Map({
  target: 'map',
  layers: [
    new ol.layer.Tile({
      source: new ol.source.OSM({crossOrigin: 'anonymous'})
    })
  ],
  view: new ol.View({
    center: ol.proj.fromLonLat([11.5, 48.8]),
    zoom: 8
  })
});

const boundaryStyle = new ol.style.Style({
  stroke: new ol.style.Stroke({color: '#005bbb', width: 3}),
  fill: new ol.style.Fill({color: 'rgba(0,91,187,0.12)'})
});
const boundaryActiveStyle = new ol.style.Style({
  stroke: new ol.style.Stroke({color: '#d81b60', width: 4}),
  fill: new ol.style.Fill({color: 'rgba(216,27,96,0.16)'})
});
const objectStyle = new ol.style.Style({
  image: new ol.style.Circle({radius: 6, fill: new ol.style.Fill({color: '#ff9800'}), stroke: new ol.style.Stroke({color: '#333', width: 1})}),
  stroke: new ol.style.Stroke({color: '#ff9800', width: 3}),
  fill: new ol.style.Fill({color: 'rgba(255,152,0,0.18)'})
});
const selectedStyle = new ol.style.Style({
  image: new ol.style.Circle({radius: 8, fill: new ol.style.Fill({color: '#00c853'}), stroke: new ol.style.Stroke({color: '#111', width: 2})}),
  stroke: new ol.style.Stroke({color: '#00c853', width: 4}),
  fill: new ol.style.Fill({color: 'rgba(0,200,83,0.18)'})
});

const selectInteraction = new ol.interaction.Select({
  style: selectedStyle,
  layers: layer => !!layer.get('surveyLayerKind')
});
map.addInteraction(selectInteraction);
const modifyInteraction = new ol.interaction.Modify({features: selectInteraction.getFeatures()});
map.addInteraction(modifyInteraction);

let drawInteraction = null;
let currentMode = null;
let activeSurveyId = null;
let loadedSurveys = {};
let selectedDescriptor = null;

function setStatus(msg) {
  document.getElementById('statusBox').textContent = msg;
}

function setActiveSurveySummary() {
  const text = activeSurveyId ? `Active survey: ${activeSurveyId}` : 'No active survey';
  document.getElementById('activeSurveySummary').textContent = text;
}

function safeJsonParse(text, fallback={}) {
  try {
    const parsed = JSON.parse(text || '{}');
    return parsed && typeof parsed === 'object' ? parsed : fallback;
  } catch {
    return fallback;
  }
}

async function fetchJson(url, options) {
  const response = await fetch(url, options);
  if (!response.ok) {
    const text = await response.text();
    throw new Error(text || response.statusText);
  }
  return await response.json();
}

async function refreshSurveyList() {
  const surveys = await fetchJson('/api/surveys');
  const select = document.getElementById('surveySelect');
  const previous = select.value;
  select.innerHTML = '<option value="">Select survey</option>';
  surveys.forEach(survey => {
    const option = document.createElement('option');
    option.value = String(survey.id);
    option.textContent = `${survey.id} — ${survey.title} (${survey.object_count})`;
    select.appendChild(option);
  });
  if (activeSurveyId && surveys.some(s => s.id === activeSurveyId)) {
    select.value = String(activeSurveyId);
  } else if (previous && surveys.some(s => String(s.id) === previous)) {
    select.value = previous;
  }
}

function getCurrentBbox4326() {
  const extent = map.getView().calculateExtent(map.getSize());
  return ol.proj.transformExtent(extent, 'EPSG:3857', 'EPSG:4326');
}

function featureToGeoJSONGeometry(feature) {
  return new ol.format.GeoJSON().writeGeometryObject(feature.getGeometry(), {
    dataProjection: 'EPSG:4326',
    featureProjection: 'EPSG:3857'
  });
}

function surveyBoundaryLayerStyle(feature) {
  return feature.get('survey_id') === activeSurveyId ? boundaryActiveStyle : boundaryStyle;
}

function objectLayerStyle() {
  return objectStyle;
}

function clearSurveyLayers(exceptSurveyId = null) {
  Object.keys(loadedSurveys).forEach(key => {
    const sid = Number(key);
    if (exceptSurveyId !== null && sid === exceptSurveyId) return;
    map.removeLayer(loadedSurveys[sid].boundaryLayer);
    map.removeLayer(loadedSurveys[sid].objectLayer);
    delete loadedSurveys[sid];
  });
}

function setSelectionFromFeature(feature) {
  if (!feature) {
    selectedDescriptor = null;
    renderDetails(null);
    renderEditor(null);
    highlightHierarchySelection();
    return;
  }
  const role = feature.get('feature_role');
  if (role === 'survey_boundary') {
    selectedDescriptor = {kind: 'survey', surveyId: Number(feature.get('survey_id'))};
    activeSurveyId = Number(feature.get('survey_id'));
  } else {
    selectedDescriptor = {kind: 'object', surveyId: Number(feature.get('survey_id')), objectId: Number(feature.get('id'))};
    activeSurveyId = Number(feature.get('survey_id'));
  }
  document.getElementById('surveySelect').value = String(activeSurveyId);
  setActiveSurveySummary();
  renderDetails(feature);
  renderEditor(feature);
  highlightHierarchySelection();
}

selectInteraction.on('select', evt => {
  const feature = evt.selected[0] || null;
  setSelectionFromFeature(feature);
});

function renderDetails(feature) {
  const box = document.getElementById('detailsBox');
  if (!feature) {
    box.textContent = 'Nothing selected';
    return;
  }
  box.textContent = JSON.stringify(feature.getProperties(), null, 2);
}

function renderEditor(feature) {
  const props = feature ? feature.getProperties() : {};
  document.getElementById('editorTitle').value = props.title || '';
  document.getElementById('editorType').value = props.type || '';
  document.getElementById('editorStatus').value = props.status || '';
  document.getElementById('editorAnnotation').value = props.annotation || '';
  document.getElementById('editorDetails').value = props.details || '';
  const editorProps = {...props};
  delete editorProps.geometry;
  document.getElementById('editorProperties').value = JSON.stringify(editorProps.properties || {}, null, 2);
}

function buildFeatureFromGeoJSON(geojson) {
  const feature = new ol.format.GeoJSON().readFeature(geojson, {dataProjection: 'EPSG:4326', featureProjection: 'EPSG:3857'});
  Object.entries(geojson.properties || {}).forEach(([key, value]) => feature.set(key, value));
  return feature;
}

async function loadSurvey(surveyId, zoomTo=false) {
  const bbox = getCurrentBbox4326().join(',');
  const [featuresGeojson, hierarchy] = await Promise.all([
    fetchJson(`/api/surveys/${surveyId}/features?bbox=${bbox}&limit=5000`),
    fetchJson(`/api/surveys/${surveyId}/hierarchy`)
  ]);

  const boundaryFeatures = [];
  const objectFeatures = [];
  (featuresGeojson.features || []).forEach(raw => {
    const feature = buildFeatureFromGeoJSON(raw);
    if (feature.get('feature_role') === 'survey_boundary') {
      boundaryFeatures.push(feature);
    } else {
      objectFeatures.push(feature);
    }
  });

  if (loadedSurveys[surveyId]) {
    map.removeLayer(loadedSurveys[surveyId].boundaryLayer);
    map.removeLayer(loadedSurveys[surveyId].objectLayer);
  }

  const boundaryLayer = new ol.layer.Vector({
    source: new ol.source.Vector({features: boundaryFeatures}),
    style: surveyBoundaryLayerStyle
  });
  boundaryLayer.set('surveyLayerKind', 'boundary');
  boundaryLayer.set('surveyId', surveyId);

  const objectLayer = new ol.layer.Vector({
    source: new ol.source.Vector({features: objectFeatures}),
    style: objectLayerStyle
  });
  objectLayer.set('surveyLayerKind', 'objects');
  objectLayer.set('surveyId', surveyId);

  map.addLayer(boundaryLayer);
  map.addLayer(objectLayer);

  const extent = ol.extent.createEmpty();
  boundaryFeatures.forEach(f => ol.extent.extend(extent, f.getGeometry().getExtent()));
  objectFeatures.forEach(f => ol.extent.extend(extent, f.getGeometry().getExtent()));

  loadedSurveys[surveyId] = {
    hierarchy,
    boundaryLayer,
    objectLayer,
    extent,
    featuresGeojson
  };

  activeSurveyId = surveyId;
  setActiveSurveySummary();
  renderHierarchy();

  if (zoomTo && !ol.extent.isEmpty(extent)) {
    map.getView().fit(extent, {padding: [40, 40, 40, 40], maxZoom: 17});
  }
}

function findFeatureByDescriptor(descriptor) {
  if (!descriptor || !loadedSurveys[descriptor.surveyId]) return null;
  const state = loadedSurveys[descriptor.surveyId];
  if (descriptor.kind === 'survey') {
    return state.boundaryLayer.getSource().getFeatures()[0] || null;
  }
  return state.objectLayer.getSource().getFeatures().find(f => Number(f.get('id')) === Number(descriptor.objectId)) || null;
}

function highlightHierarchySelection() {
  document.querySelectorAll('.hierarchyRow').forEach(row => row.classList.remove('selected'));
  if (!selectedDescriptor) return;
  const key = selectedDescriptor.kind === 'survey'
    ? `survey:${selectedDescriptor.surveyId}`
    : `object:${selectedDescriptor.objectId}`;
  const row = document.querySelector(`.hierarchyRow[data-key="${key}"]`);
  if (row) row.classList.add('selected');
}

function renderHierarchy() {
  const list = document.getElementById('hierarchyList');
  list.innerHTML = '';
  Object.values(loadedSurveys).sort((a,b)=>a.hierarchy.survey.id-b.hierarchy.survey.id).forEach(state => {
    const survey = state.hierarchy.survey;
    const surveyRow = document.createElement('div');
    surveyRow.className = 'hierarchyRow survey';
    surveyRow.dataset.key = `survey:${survey.id}`;
    surveyRow.textContent = `${survey.id} — ${survey.title}`;
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = `${state.hierarchy.objects.length} objects`;
    surveyRow.appendChild(badge);
    surveyRow.onclick = () => {
      activeSurveyId = survey.id;
      document.getElementById('surveySelect').value = String(survey.id);
      const feature = findFeatureByDescriptor({kind: 'survey', surveyId: survey.id});
      selectInteraction.getFeatures().clear();
      if (feature) selectInteraction.getFeatures().push(feature);
      setSelectionFromFeature(feature);
    };
    list.appendChild(surveyRow);

    state.hierarchy.objects.forEach(obj => {
      const row = document.createElement('div');
      row.className = 'hierarchyRow';
      row.style.paddingLeft = '22px';
      row.dataset.key = `object:${obj.id}`;
      row.textContent = `${obj.id} — ${obj.title || obj.type}`;
      row.onclick = () => {
        activeSurveyId = obj.survey_id;
        document.getElementById('surveySelect').value = String(obj.survey_id);
        const feature = findFeatureByDescriptor({kind: 'object', surveyId: obj.survey_id, objectId: obj.id});
        selectInteraction.getFeatures().clear();
        if (feature) selectInteraction.getFeatures().push(feature);
        setSelectionFromFeature(feature);
      };
      list.appendChild(row);
    });
  });
  highlightHierarchySelection();
}

async function refreshHierarchy() {
  if (!activeSurveyId) return;
  if (!loadedSurveys[activeSurveyId]) {
    await loadSurvey(activeSurveyId, false);
    return;
  }
  loadedSurveys[activeSurveyId].hierarchy = await fetchJson(`/api/surveys/${activeSurveyId}/hierarchy`);
  renderHierarchy();
}

function clearDrawInteraction() {
  if (drawInteraction) {
    map.removeInteraction(drawInteraction);
    drawInteraction = null;
  }
  currentMode = null;
}

function armDraw(kind) {
  if (!activeSurveyId) {
    setStatus('Select or load a survey first.');
    return;
  }
  clearDrawInteraction();
  currentMode = kind;
  drawInteraction = new ol.interaction.Draw({
    source: new ol.source.Vector(),
    type: kind
  });
  drawInteraction.on('drawend', async evt => {
    try {
      const geometry = featureToGeoJSONGeometry(evt.feature);
      const payload = {
        expedition_id: Number(document.getElementById('objectExpeditionId').value || 1),
        type: document.getElementById('objectType').value,
        geometry,
        title: document.getElementById('objectTitle').value || null,
        annotation: document.getElementById('objectAnnotation').value || null,
        details: document.getElementById('objectDetails').value || null,
        properties: safeJsonParse(document.getElementById('objectProperties').value, {})
      };
      await fetchJson(`/api/surveys/${activeSurveyId}/objects`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      setStatus(`Created ${kind} object on survey ${activeSurveyId}.`);
      clearDrawInteraction();
      await loadSurvey(activeSurveyId, false);
    } catch (error) {
      setStatus(`Create object failed: ${error.message}`);
    }
  });
  map.addInteraction(drawInteraction);
  setStatus(`Draw ${kind} on the map for survey ${activeSurveyId}.`);
}

function armCreateSurveyPolygon() {
  clearDrawInteraction();
  currentMode = 'createSurvey';
  drawInteraction = new ol.interaction.Draw({source: new ol.source.Vector(), type: 'Polygon'});
  drawInteraction.on('drawend', async evt => {
    try {
      const payload = {
        expedition_id: Number(document.getElementById('createSurveyExpeditionId').value || 1),
        title: document.getElementById('createSurveyTitle').value || 'New survey',
        status: document.getElementById('createSurveyStatus').value || 'planned',
        geometry: featureToGeoJSONGeometry(evt.feature),
        metadata: safeJsonParse(document.getElementById('createSurveyMetadata').value, {})
      };
      const created = await fetchJson('/api/surveys', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      activeSurveyId = created.survey_id;
      setStatus(`Created survey ${created.survey_id}.`);
      clearDrawInteraction();
      await refreshSurveyList();
      document.getElementById('surveySelect').value = String(activeSurveyId);
      await loadSurvey(activeSurveyId, true);
    } catch (error) {
      setStatus(`Create survey failed: ${error.message}`);
    }
  });
  map.addInteraction(drawInteraction);
  setStatus('Draw a polygon to create a survey.');
}

async function saveSelectedGeometry() {
  const feature = selectInteraction.getFeatures().item(0);
  if (!feature) {
    setStatus('Select a feature first.');
    return;
  }
  try {
    if (feature.get('feature_role') === 'survey_boundary') {
      await fetchJson(`/api/surveys/${feature.get('survey_id')}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({geometry: featureToGeoJSONGeometry(feature)})
      });
      setStatus(`Saved boundary geometry for survey ${feature.get('survey_id')}.`);
      await loadSurvey(Number(feature.get('survey_id')), false);
    } else {
      await fetchJson(`/api/survey-objects/${feature.get('id')}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({geometry: featureToGeoJSONGeometry(feature)})
      });
      setStatus(`Saved geometry for object ${feature.get('id')}.`);
      await loadSurvey(Number(feature.get('survey_id')), false);
    }
  } catch (error) {
    setStatus(`Save geometry failed: ${error.message}`);
  }
}

async function saveSelectedDetails() {
  if (!selectedDescriptor) {
    setStatus('Select a survey or object first.');
    return;
  }
  const title = document.getElementById('editorTitle').value || null;
  const annotation = document.getElementById('editorAnnotation').value || null;
  const details = document.getElementById('editorDetails').value || null;
  const type = document.getElementById('editorType').value || null;
  const status = document.getElementById('editorStatus').value || null;
  const properties = safeJsonParse(document.getElementById('editorProperties').value, {});
  try {
    if (selectedDescriptor.kind === 'survey') {
      const metadata = {...properties};
      if (annotation !== null) metadata.annotation = annotation;
      if (details !== null) metadata.details = details;
      await fetchJson(`/api/surveys/${selectedDescriptor.surveyId}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title, status, metadata})
      });
      setStatus(`Saved survey ${selectedDescriptor.surveyId}.`);
      await refreshSurveyList();
      await loadSurvey(selectedDescriptor.surveyId, false);
    } else {
      await fetchJson(`/api/survey-objects/${selectedDescriptor.objectId}`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({title, annotation, details, type, properties})
      });
      setStatus(`Saved object ${selectedDescriptor.objectId}.`);
      await loadSurvey(selectedDescriptor.surveyId, false);
    }
  } catch (error) {
    setStatus(`Save details failed: ${error.message}`);
  }
}

async function deleteSelectedObject() {
  if (!selectedDescriptor || selectedDescriptor.kind !== 'object') {
    setStatus('Select an object first.');
    return;
  }
  if (!window.confirm(`Delete object ${selectedDescriptor.objectId}?`)) return;
  try {
    await fetchJson(`/api/survey-objects/${selectedDescriptor.objectId}`, {method: 'DELETE'});
    setStatus(`Deleted object ${selectedDescriptor.objectId}.`);
    selectInteraction.getFeatures().clear();
    selectedDescriptor = null;
    await loadSurvey(selectedDescriptor?.surveyId || activeSurveyId, false);
  } catch (error) {
    setStatus(`Delete object failed: ${error.message}`);
  }
}

async function deleteActiveSurvey() {
  if (!activeSurveyId) {
    setStatus('No active survey selected.');
    return;
  }
  if (!window.confirm(`Delete survey ${activeSurveyId} and its objects?`)) return;
  try {
    await fetchJson(`/api/surveys/${activeSurveyId}`, {method: 'DELETE'});
    clearSurveyLayers(activeSurveyId);
    selectInteraction.getFeatures().clear();
    selectedDescriptor = null;
    const old = activeSurveyId;
    activeSurveyId = null;
    setActiveSurveySummary();
    renderHierarchy();
    renderDetails(null);
    renderEditor(null);
    await refreshSurveyList();
    setStatus(`Deleted survey ${old}.`);
  } catch (error) {
    setStatus(`Delete survey failed: ${error.message}`);
  }
}

function showActiveOnly() {
  if (!activeSurveyId) return;
  clearSurveyLayers(activeSurveyId);
  renderHierarchy();
}

function zoomActiveSurvey() {
  if (!activeSurveyId || !loadedSurveys[activeSurveyId]) return;
  const extent = loadedSurveys[activeSurveyId].extent;
  if (extent && !ol.extent.isEmpty(extent)) {
    map.getView().fit(extent, {padding: [40,40,40,40], maxZoom: 17});
  }
}


function getExportOptions() {
  return {
    include_boundary: document.getElementById('exportIncludeBoundary').checked,
    include_objects: document.getElementById('exportIncludeObjects').checked,
    include_archived: document.getElementById('exportIncludeArchived').checked,
    include_geometry: document.getElementById('exportIncludeGeometry').checked,
    include_properties: document.getElementById('exportIncludeProperties').checked,
    include_document_details: document.getElementById('exportDocumentIncludeDetails').checked,
    include_document_map: document.getElementById('exportDocumentIncludeMap').checked
  };
}

function buildQuery(params) {
  const search = new URLSearchParams();
  Object.entries(params).forEach(([key, value]) => search.set(key, String(value)));
  return search.toString();
}

function downloadText(filename, content, mimeType='application/json') {
  const blob = new Blob([content], {type: mimeType});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getCurrentMapImageDataUrl() {
  try {
    const canvas = map.getViewport().querySelector('canvas');
    if (!canvas) return null;
    return canvas.toDataURL('image/png');
  } catch {
    return null;
  }
}

async function downloadLayerExport() {
  if (!activeSurveyId) { setStatus('Select an active survey first.'); return; }
  try {
    const opts = getExportOptions();
    const query = buildQuery({
      include_boundary: opts.include_boundary,
      include_objects: opts.include_objects,
      include_archived: opts.include_archived
    });
    const payload = await fetchJson(`/api/surveys/${activeSurveyId}/export/layer.geojson?${query}`);
    downloadText(`survey_${activeSurveyId}_layer.geojson`, JSON.stringify(payload, null, 2), 'application/geo+json');
    setStatus(`Downloaded layer export for survey ${activeSurveyId}.`);
  } catch (error) {
    setStatus(`Layer export failed: ${error.message}`);
  }
}

async function downloadDataExport() {
  if (!activeSurveyId) { setStatus('Select an active survey first.'); return; }
  try {
    const opts = getExportOptions();
    const query = buildQuery({
      include_boundary: opts.include_boundary,
      include_objects: opts.include_objects,
      include_archived: opts.include_archived,
      include_geometry: opts.include_geometry,
      include_properties: opts.include_properties
    });
    const payload = await fetchJson(`/api/surveys/${activeSurveyId}/export/data.json?${query}`);
    downloadText(`survey_${activeSurveyId}_data.json`, JSON.stringify(payload, null, 2), 'application/json');
    setStatus(`Downloaded data export for survey ${activeSurveyId}.`);
  } catch (error) {
    setStatus(`Data export failed: ${error.message}`);
  }
}

function buildPrintableDocumentHtml(doc, mapImageDataUrl, includeDetails) {
  const survey = doc.survey || {};
  const objects = Array.isArray(doc.objects) ? doc.objects : [];
  const rows = objects.map(obj => {
    const properties = obj.properties ? `<pre>${escapeHtml(JSON.stringify(obj.properties, null, 2))}</pre>` : '';
    const detailCell = includeDetails ? `<div><strong>Details:</strong> ${escapeHtml(obj.details || '')}</div><div><strong>Annotation:</strong> ${escapeHtml(obj.annotation || '')}</div>${properties}` : '';
    return `<tr><td>${escapeHtml(obj.id)}</td><td>${escapeHtml(obj.type || '')}</td><td>${escapeHtml(obj.title || '')}</td><td>${escapeHtml(obj.is_active ? 'active' : 'archived')}</td><td>${detailCell}</td></tr>`;
  }).join('');
  const mapSection = mapImageDataUrl ? `<h2>Map snapshot</h2><img src="${mapImageDataUrl}" style="max-width:100%; border:1px solid #ccc;">` : '';
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>Survey ${escapeHtml(survey.id)} export</title><style>body{font-family:Arial,sans-serif;margin:24px;line-height:1.4;} table{width:100%;border-collapse:collapse;} th,td{border:1px solid #ccc;padding:8px;vertical-align:top;} h1,h2{margin:16px 0 8px;} pre{white-space:pre-wrap;word-break:break-word;}</style></head><body><h1>Survey ${escapeHtml(survey.id)} — ${escapeHtml(survey.title || '')}</h1><p><strong>Status:</strong> ${escapeHtml(survey.status || '')}<br><strong>Layer key:</strong> ${escapeHtml(survey.layer_key || '')}<br><strong>Expedition:</strong> ${escapeHtml(survey.expedition_id || '')}</p><h2>Summary</h2><p><strong>Total objects:</strong> ${escapeHtml(doc.summary?.object_count || 0)}<br><strong>Active objects:</strong> ${escapeHtml(doc.summary?.active_count || 0)}<br><strong>Archived objects:</strong> ${escapeHtml(doc.summary?.archived_count || 0)}</p>${mapSection}<h2>Survey metadata</h2><pre>${escapeHtml(JSON.stringify(survey.metadata || {}, null, 2))}</pre><h2>Objects</h2><table><thead><tr><th>ID</th><th>Type</th><th>Title</th><th>Status</th><th>Details</th></tr></thead><tbody>${rows}</tbody></table></body></html>`;
}

async function downloadDocumentExport() {
  if (!activeSurveyId) { setStatus('Select an active survey first.'); return; }
  try {
    const opts = getExportOptions();
    const query = buildQuery({
      include_boundary: opts.include_boundary,
      include_objects: opts.include_objects,
      include_archived: opts.include_archived,
      include_geometry: false,
      include_properties: opts.include_properties
    });
    const payload = await fetchJson(`/api/surveys/${activeSurveyId}/export/document.json?${query}`);
    const mapImage = opts.include_document_map ? getCurrentMapImageDataUrl() : null;
    const html = buildPrintableDocumentHtml(payload, mapImage, opts.include_document_details);
    downloadText(`survey_${activeSurveyId}_document.html`, html, 'text/html');
    setStatus(`Downloaded printable document for survey ${activeSurveyId}.`);
  } catch (error) {
    setStatus(`Document export failed: ${error.message}`);
  }
}

function bindTabs() {
  document.querySelectorAll('.tabButton').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabButton').forEach(x => x.classList.remove('active'));
      document.querySelectorAll('.tabPanel').forEach(x => x.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });
}

document.getElementById('refreshSurveysBtn').onclick = async () => {
  try { await refreshSurveyList(); setStatus('Survey list refreshed.'); } catch (error) { setStatus(error.message); }
};
document.getElementById('loadSurveyBtn').onclick = async () => {
  const surveyId = Number(document.getElementById('surveySelect').value);
  if (!surveyId) return;
  try { await loadSurvey(surveyId, true); setStatus(`Loaded survey ${surveyId}.`); } catch (error) { setStatus(error.message); }
};
document.getElementById('showActiveOnlyBtn').onclick = showActiveOnly;
document.getElementById('zoomActiveBtn').onclick = zoomActiveSurvey;
document.getElementById('reloadHierarchyBtn').onclick = refreshHierarchy;
document.getElementById('armPointBtn').onclick = () => armDraw('Point');
document.getElementById('armLineBtn').onclick = () => armDraw('LineString');
document.getElementById('armPolygonBtn').onclick = () => armDraw('Polygon');
document.getElementById('armCreateSurveyBtn').onclick = armCreateSurveyPolygon;
document.getElementById('saveSelectedGeometryBtn').onclick = saveSelectedGeometry;
document.getElementById('saveSelectedDetailsBtn').onclick = saveSelectedDetails;
document.getElementById('deleteSelectedBtn').onclick = deleteSelectedObject;
document.getElementById('deleteActiveSurveyBtn').onclick = deleteActiveSurvey;
document.getElementById('downloadLayerExportBtn').onclick = downloadLayerExport;
document.getElementById('downloadDataExportBtn').onclick = downloadDataExport;
document.getElementById('downloadDocumentExportBtn').onclick = downloadDocumentExport;
document.getElementById('surveySelect').onchange = () => {
  const surveyId = Number(document.getElementById('surveySelect').value);
  activeSurveyId = surveyId || null;
  setActiveSurveySummary();
};

bindTabs();
refreshSurveyList().then(() => setStatus('Ready.')).catch(error => setStatus(error.message));
</script>
